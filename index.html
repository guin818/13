<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>🔗</title><style>body{font-family:-apple-system,sans-serif;background:#f5f7fa;padding:20px;display:flex;flex-direction:column;align-items:center}.card{background:#fff;padding:20px;border-radius:15px;box-shadow:0 4px 6px rgba(0,0,0,.1);width:100%;max-width:400px;box-sizing:border-box}input{width:100%;padding:12px;margin:10px 0;border:1px solid #ddd;border-radius:8px;box-sizing:border-box;font-size:16px}button{width:100%;padding:12px;background:#007bff;color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:700;cursor:pointer}.res{margin-top:20px;padding:15px;background:#e9ecef;border-radius:8px;word-break:break-all;display:none}</style></head><body><div class="card"><h3 style="margin:0;text-align:center">초간단 단축 링크</h3><input type="url" id="url" placeholder="https://..." required><input type="text" id="slug" placeholder="단축 단어 (선택)"><button onclick="mk()">링크 생성</button><div class="res" id="box"><p id="short" style="color:#007bff;font-weight:700;margin:5px 0;font-size:18px"></p><button onclick="cp()" style="background:#28a745;margin-top:5px">복사</button></div></div><script>window.onload=function(){const e=window.location.hash.substring(1);if(e){const n=localStorage.getItem("sh_"+e);n?window.location.href=n:(alert("없는 링크입니다."),window.location.href=window.location.pathname)}};function mk(){const e=document.getElementById("url").value;let n=document.getElementById("slug").value.trim();if(!e)return alert("주소를 입력하세요.");n||(n=Math.random().toString(36).substr(2,3));localStorage.setItem("sh_"+n,e);const t=window.location.origin+window.location.pathname+"#"+n;document.getElementById("short").innerText=t,document.getElementById("box").style.display="block"}function cp(){navigator.clipboard.writeText(document.getElementById("short").innerText),alert("복사 완료!")}</script></body></html>
